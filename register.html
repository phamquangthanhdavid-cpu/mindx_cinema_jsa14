<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="./style/style.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" 
    rel="stylesheet" 
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" 
    crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" 
    crossorigin="anonymous"></script>
    
</head>
<body>
    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card shadow p-5" style="width: 400px;">
            <h1 class="mb-3">Register</h1>
            <input class="form-control mb-3" type="text" placeholder="Uername">
            <input class="form-control mb-3" type="email" placeholder="Email">
            <input class="form-control mb-3" type="password" placeholder="Password">
            <input class="form-control mb-3" type="password" placeholder="Confirm-Password">
            <a class="text-danger fw-bolder text-decoration-none mb-3" href="./login.html">Already have an account?</a>
            <button class="mb-3 btn btn-danger">Create new account</button>
        </div>
    </div>
</body>
<script src="./script/register.js"></script>
</html>
